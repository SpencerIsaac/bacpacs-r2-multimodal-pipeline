name: tests

on:
  push:
    branches:
      - main
      - "feature/**"
      - control-panel-ledger-ui
  pull_request:

jobs:
  test:
    name: Windows Python 3.13
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile source and tests
        run: python -m compileall Modality_Pipelines scripts tests

      - name: Run unit tests
        run: python -m pytest tests

      - name: Check CLI entry point
        run: |
          bacpacs --help
          bacpacs studies
          bacpacs status --study R2

      - name: Run mock full-pipeline smoke test
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/full_pipeline_smoke.py --study R2


